# See https://wiki.hyprland.org/Configuring/Monitors/

# Use single default monitor (see all monitors with: hyprctl monitors)
monitor=,preferred,auto,auto

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60.00, auto, 2
# monitor = eDP-1, 2880x1920@120.00, auto, 2

# laptop monitor
monitor = eDP-1, 3840x2160@60.00700, auto, 2
# primary external monitor, horizontal
monitor = DP-3, 3840x2160@59.99700, auto, auto
# secondary external monitor, vertical
# monitor = DP-2, 2560x1440, 2560x0, transform, 3 

# trigger when the lid is opened - re-enable laptop display and redistribute workspaces
bindl = ,switch:off:Lid Switch,exec,~/.config/hypr/scripts/lid-open.sh
# trigger when the lid is closed - migrate workspaces then disable laptop display
bindl = ,switch:on:Lid Switch,exec,~/.config/hypr/scripts/lid-close.sh
