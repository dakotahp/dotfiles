# See https://wiki.hyprland.org/Configuring/Monitors/

# Default rule for the laptop display and any other monitor without a specific rule below.
monitor = ,preferred,auto,auto

# Primary external monitor, horizontal
monitor = DP-3, 3840x2160@59.99700, auto, auto
# Secondary external monitor, vertical
# monitor = DP-2, 2560x1440, 2560x0, transform, 3

# Lid handling is provided by Omarchy in:
#   ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
# Closing the lid disables eDP-1 when an external monitor is connected;
# Hyprland auto-migrates its workspaces to the remaining active monitor.
# Manual toggle: Super+Ctrl+Delete. Move workspaces between monitors:
# Super+Shift+Alt+Arrow.
